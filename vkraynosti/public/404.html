<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Вкрайности</title>
    <script>
      // GitHub Pages SPA redirect: encode the full path into ?p= query param
      // segmentCount = 1 matches the depth of the repo base path (/vkraynosti)
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
