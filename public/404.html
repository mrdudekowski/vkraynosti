  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vkraynosti/favicon.svg" />
    <meta name="description" content="Авторские туры по Приморью из Владивостока — Вкрайности." />
    <meta property="og:title" content="Вкрайности — Туры по Приморью из Владивостока" />
    <meta property="og:description" content="Авторские туры по Приморью: заповедное побережье, сопки и море из Владивостока." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://mrdudekowski.github.io/vkraynosti/banners_summer/Summer.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Вкрайности</title>
    <script>
      // GitHub Pages SPA redirect: encode the full path into ?p= query param
      // segmentCount = 1 matches the depth of the repo base path (/vkraynosti)
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
